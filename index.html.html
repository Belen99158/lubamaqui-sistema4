<script>
/* ============================================================
   CONFIGURACIÓN GOOGLE SHEETS
   La hoja debe estar publicada en la web como CSV.

   ============================================================ */
const SHEETS_ID = "2PACX-1vTpOv2PFreipcoBc7ry-bD3QSRbqD49nQicajrI86pDAuUuQkbPoiszwxmt2HQbodo4zAlHI2rvknPk";
// URL de exportación CSV directa (pública, sin auth)
const CSV_URL = `https://docs.google.com/spreadsheets/d/e/${SHEETS_ID}/pub?output=csv&gid=0`;

/* ============================================================ USUARIOS ============================================================ */
const USERS = [
 ...[["JOSUE PINEDA","1999"],["CARLOS HERRERA","2000"],["MOISES MOLINA","5003"],["SEBASTIAN VANEGAS","8001"],
 ["DANIEL ESPAÑA","1552"],["FERNANDO MEZA","3225"],["PABLO PERALTA","4550"],["CRISTIAN SALAZAR","4888"],
 ["CARLOS GRANJA","7810"],["CRISTINA CIFUENTES","8520"],["EDISON MAYORGA","6588"],["EDUARDO PICO","0458"],
 ["STALIN COBA","2150"],["MABEL JACOME","0545"],["DIEGO ACHACHI","0254"],["CALL CENTER 1","8054"]]
   .map(([n,p])=>({name:n,pass:p,role:"ASESOR"})),
 {name:"ANTHONY SANTILLAN (Mercadería)",pass:"1125",role:"MERCADERIA"},
 {name:"REVISOR MER1",pass:"1126",role:"MERCADERIA"},
 {name:"ANTHONY SANTILLAN (Devolución)",pass:"1255",role:"DEVOLUCION"},
 {name:"REVISOR DEV1",pass:"1256",role:"DEVOLUCION"},
 {name:"WILLIAM MANOTOA",pass:"5554",role:"GARANTIA"},
 {name:"REVISOR GAR1",pass:"5556",role:"GARANTIA"},
 {name:"JESSICA ANJA",pass:"1984",role:"NC"},
 {name:"REVISOR NC1",pass:"1985",role:"NC"},
 {name:"BELEN MANZANO",pass:"1112",role:"ADMIN"},
 {name:"WILLIAM ACHACHI",pass:"1113",role:"ADMIN"},
 {name:"TANNIA BASSANTES",pass:"1114",role:"ADMIN"},
];
const ROLE_LABEL={ASESOR:"Asesor comercial",MERCADERIA:"Revisión de mercadería",DEVOLUCION:"Revisión de devolución",GARANTIA:"Revisión de garantía",NC:"Notas de crédito",ADMIN:"Administrativo"};
const MOTIVOS=["DACION EN PAGOS","GESTION COMERCIAL CLIENTE VENDEDOR","LOGISTICA BODEGA","DEVOLUCION","GARANTIAS"];
const MARCAS=["PERMATEX","ORIGINAL","VALEO","MAHLE","ABRO","LUBA AUTOPARTS","SEIWA","NPR","SABO","APLIC","JCC","MAGNETI MARELLI","AUTOTOP","OTRO"];
const ESTADO_LABEL={MERCADERIA:"En revisión mercadería",DEVOLUCION:"En revisión devolución",GARANTIA:"En revisión garantía",NC:"En notas de crédito",NO_LLEGO:"No llegó",DEV_RECHAZADA:"Devolución no aceptada",GAR_RECHAZADA:"Garantía no aceptada",ELIMINADO:"Eliminado"};
const MESES=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

let me=null, base=[], RAZONES=[];
/* state guarda tickets y secuencias; ahora persiste en Firebase Realtime Database */
let state={seq3200:0,seq5200:0,tickets:[]};
/* Caché en memoria de la base de facturas; se recarga desde Sheets solo si es necesario */
let baseLoaded=false, baseFechaStr="", baseLineas=0;

/* ============================================================ FIREBASE ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyDI_Xszfjw9f_O1CsL0VC8F_dNtWGEvmo8",
  authDomain: "devoluciones-y-garantias.firebaseapp.com",
  databaseURL: "https://devoluciones-y-garantias-default-rtdb.firebaseio.com",
  projectId: "devoluciones-y-garantias",
  storageBucket: "devoluciones-y-garantias.firebasestorage.app",
  messagingSenderId: "1009454788938",
  appId: "1:1009454788938:web:aa7dc86d838f0c6d2051b3"
};
let fbApp=null, fbDB=null, fbReady=false, fbSuscrito=false, guardando=false;
function initFirebase(){
  try{
    if(typeof firebase==="undefined") throw new Error("SDK de Firebase no cargó (revisa conexión)");
    fbApp=firebase.initializeApp(firebaseConfig);
    fbDB=firebase.database();
    fbReady=true;
    return true;
  }catch(e){
    console.error("Firebase init:",e);
    toast("⚠ No se pudo conectar a Firebase: "+(e&&e.message||e),6000);
    return false;
  }
}
/* Carga inicial + suscripción en tiempo real.
   Cuando otro usuario crea/modifica un ticket, la vista se actualiza sola. */
function suscribirEstado(onPrimera){
  if(!fbReady){ if(onPrimera) onPrimera(); return; }
  const ref=fbDB.ref("estado");
  let primera=true;
  ref.on("value",snap=>{
    const val=snap.val();
    if(val){
      state={
        seq3200:val.seq3200||0,
        seq5200:val.seq5200||0,
        tickets:Array.isArray(val.tickets)?val.tickets:(val.tickets?Object.values(val.tickets):[])
      };
    }else{
      state={seq3200:0,seq5200:0,tickets:[]};
    }
    if(primera){ primera=false; if(onPrimera) onPrimera(); }
    else if(me){ render(); } // actualización en vivo desde otro dispositivo
  },err=>{
    console.error("Firebase read:",err);
    toast("⚠ Error leyendo de Firebase: "+(err&&err.message||err),5000);
    if(primera){ primera=false; if(onPrimera) onPrimera(); }
  });
  fbSuscrito=true;
}
async function saveState(){
  if(!fbReady){ toast("⚠ Sin conexión a Firebase. Los cambios no se guardaron."); return; }
  guardando=true;
  try{
    await fbDB.ref("estado").set({
      seq3200:state.seq3200||0,
      seq5200:state.seq5200||0,
      tickets:state.tickets||[],
      _updated:firebase.database.ServerValue.TIMESTAMP
    });
  }catch(e){
    console.error("Firebase write:",e);
    toast("⚠ Error guardando en Firebase: "+(e&&e.message||e),6000);
  }finally{ guardando=false; }
}
/* Guardar el PDF de una NC en Firebase (como dataURL en su propio nodo) */
async function guardarPdfNC(ticketId,pdfObj){
  if(!fbReady) throw new Error("Sin conexión a Firebase");
  await fbDB.ref("ncpdf/"+ticketId).set(pdfObj);
}
async function leerPdfNCfb(ticketId){
  if(!fbReady) throw new Error("Sin conexión a Firebase");
  const snap=await fbDB.ref("ncpdf/"+ticketId).get();
  return snap.val();
}

/* ============================================================ CARGA BASE DESDE GOOGLE SHEETS ============================================================ */
/* La base de facturas se carga directo del CSV público de Sheets.
   Se cachea en memoria por sesión. El admin puede forzar recarga. */
async function cargarBaseDesdeSheets(forzar=false, onProg=null){
  if(baseLoaded&&!forzar) return; // ya en memoria
  if(onProg) onProg("Descargando base de facturas desde Google Sheets…", 10);
  let csvText=null, ultimoError="";

  // Lista de métodos de descarga, se prueban en orden hasta que uno funcione
  const metodos=[
    // 1) Directo (funciona en GitHub Pages y la mayoría de hostings reales)
    async()=>{ const r=await fetch(CSV_URL); if(!r.ok)throw new Error("HTTP "+r.status); return await r.text(); },
    // 2) Proxy allorigins (raw)
    async()=>{ const r=await fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(CSV_URL)); if(!r.ok)throw new Error("HTTP "+r.status); return await r.text(); },
    // 3) Proxy allorigins (get/json)
    async()=>{ const r=await fetch("https://api.allorigins.win/get?url="+encodeURIComponent(CSV_URL)); if(!r.ok)throw new Error("HTTP "+r.status); const j=await r.json(); return j.contents; },
    // 4) Proxy corsproxy.io
    async()=>{ const r=await fetch("https://corsproxy.io/?url="+encodeURIComponent(CSV_URL)); if(!r.ok)throw new Error("HTTP "+r.status); return await r.text(); },
    // 5) Proxy thingproxy
    async()=>{ const r=await fetch("https://thingproxy.freeboard.io/fetch/"+CSV_URL); if(!r.ok)throw new Error("HTTP "+r.status); return await r.text(); },
  ];

  for(let m=0;m<metodos.length;m++){
    try{
      if(onProg) onProg("Conectando con Google Sheets (intento "+(m+1)+"/"+metodos.length+")…", 10+m*8);
      const txt=await metodos[m]();
      // Validar que sea CSV real (debe contener encabezados esperados, no HTML de error)
      if(txt && txt.length>50 && (txt.toUpperCase().includes("FACTURA")||txt.includes(","))){
        csvText=txt; break;
      }
      ultimoError="Respuesta no válida";
    }catch(e){ ultimoError=(e&&e.message)||String(e); }
  }

  if(!csvText){
    throw new Error("No se pudo descargar la base desde Google Sheets. "+ultimoError+". (En la vista previa esto es normal; al publicar en GitHub Pages funcionará el método directo.)");
  }
  if(onProg) onProg("Procesando filas…", 60);
  base = parsearCSV(csvText);
  indexarBase();
  baseLoaded=true;
  baseLineas=base.length;
  baseFechaStr="Actualizada: "+new Date().toLocaleString("es-EC",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
  actualizarChipBase();
  if(onProg) onProg("Base lista: "+base.length.toLocaleString("es-EC")+" líneas", 100);
}

function parsearCSV(text){
  // Parser CSV robusto (maneja comillas, saltos, etc.)
  const norm=k=>String(k||"").trim().toUpperCase().replace(/\s+/g," ");
  const rows=[];
  const lines=text.split(/\r?\n/);
  if(lines.length<2) return [];
  // Detectar separador
  const sep=lines[0].includes(";")?";":",";
  const headers=splitCSVLine(lines[0],sep).map(norm);
  const idx=h=>headers.indexOf(h);
  const iEmi=idx("EMISION"), iFact=idx("FACTURA"), iRuc=idx("IDENTIFICACION"), iRazon=idx("RAZON SOCIAL");
  const iCod=idx("CODIGO PRODUCTO"), iDesc=idx("DESCRIPCION PRODUCTO"), iSub=idx("SUBGRUPO");
  const iCant=idx("CANTIDAD"), iNeto=idx("PRECIO TOTAL NETO"), iIva=idx("IVA TOTAL"), iTot=idx("TOTAL PRODUCTO");
  const iFact2=idx("FACTURADOR");
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim()) continue;
    const c=splitCSVLine(lines[i],sep);
    const fact=String(c[iFact]||"").trim();
    const razon=String(c[iRazon]||"").trim();
    if(!fact||!razon) continue;
    rows.push({emision:String(c[iEmi]||"").trim(),factura:fact,ruc:String(c[iRuc]||"").trim(),
      razon,codigo:String(c[iCod]||"").trim(),desc:String(c[iDesc]||"").trim(),sub:String(c[iSub]||"").trim(),
      facturador:String(c[iFact2]||"").trim(),
      cant:+(c[iCant]||0)||0,neto:+(c[iNeto]||0)||0,iva:+(c[iIva]||0)||0,total:+(c[iTot]||0)||0});
  }
  return rows;
}
function splitCSVLine(line,sep=","){
  const cols=[]; let cur="", inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(c===sep&&!inQ){cols.push(cur);cur="";}
    else cur+=c;
  }
  cols.push(cur);
  return cols;
}
function indexarBase(){ RAZONES=[...new Set(base.map(r=>r.razon.trim()))].sort(); }
function actualizarChipBase(){
  const el=document.getElementById("chip-base");
  if(el) el.textContent=baseLoaded?`📋 ${baseLineas.toLocaleString("es-EC")} líneas`:"";
}

/* ============================================================ UTIL ============================================================ */
const $=id=>document.getElementById(id);
const esc=s=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const money=n=>"$"+(Number(n)||0).toFixed(2);
const fdate=d=>{ if(!d) return ""; const x=new Date(d); return isNaN(x)?String(d):x.toLocaleDateString("es-EC",{day:"2-digit",month:"2-digit",year:"numeric"}); };
const fdatetime=d=>{ if(!d) return ""; const x=new Date(d); return isNaN(x)?String(d):x.toLocaleDateString("es-EC",{day:"2-digit",month:"2-digit",year:"numeric"})+" "+x.toLocaleTimeString("es-EC",{hour:"2-digit",minute:"2-digit"}); };
const fechaLarga=d=>{ const x=d?new Date(d):new Date(); if(isNaN(x))return String(d); return x.getDate()+" de "+MESES[x.getMonth()]+" de "+x.getFullYear()+"."; };
function toast(m,dur=3800){ const t=document.createElement("div"); t.className="toast"; t.textContent=m; document.body.appendChild(t); setTimeout(()=>t.remove(),dur); }
const llegoQ=i=>!i.merc?0:(i.merc.cantLlegada!==undefined?i.merc.cantLlegada:(i.merc.llego?i.cantidad:0));
function findT(id){ return state.tickets.find(t=>t.id===id); }
function codigosUsados(factura){ const s=new Map(); state.tickets.forEach(t=>{ if(t.factura===factura&&t.estado!=="ELIMINADO") t.items.forEach(i=>s.set(i.codigo,t.numero)); }); return s; }
function tagFor(t){
  if(t.estado==="MERCADERIA") return '<span class="tag tag-merc">En mercadería</span>';
  if(t.estado==="DEVOLUCION") return '<span class="tag tag-dev">En devolución</span>';
  if(t.estado==="GARANTIA") return '<span class="tag tag-gar">En garantía</span>';
  if(t.estado==="NC") return '<span class="tag tag-nc">Notas de crédito'+(t.nc&&t.nc.hecha?" · NC hecha":" · pendiente")+'</span>';
  if(t.estado==="NO_LLEGO") return '<span class="tag tag-bad">No llegó</span>';
  if(t.estado==="DEV_RECHAZADA") return '<span class="tag tag-bad">Devolución no aceptada</span>';
  if(t.estado==="GAR_RECHAZADA") return '<span class="tag tag-bad">Garantía no aceptada</span>';
  if(t.estado==="ELIMINADO") return '<span class="tag tag-bad">Eliminado</span>';
  return '<span class="tag tag-fin">'+esc(t.estado)+'</span>';
}

/* ============================================================ LOGIN ============================================================ */
function initLogin(){
  $("login-user").innerHTML=USERS.map((u,i)=>`<option value="${i}">${esc(u.name)} — ${ROLE_LABEL[u.role]}</option>`).join("");
}
async function doLogin(){
  const u=USERS[+$("login-user").value];
  if($("login-pass").value!==u.pass){$("login-err").style.display="block";return;}
  $("login-err").style.display="none"; me=u;
  $("login-view").style.display="none"; $("app-view").style.display="block";
  $("chip-role").textContent=ROLE_LABEL[u.role]; $("chip-user").textContent=u.name;
  $("main").innerHTML=`<div class="empty" style="padding:60px 20px"><div class="big">Cargando…</div><div id="load-msg" class="muted">Conectando a Firebase</div><div class="prog-bar" style="max-width:340px;margin:12px auto"><div class="prog-fill" id="load-prog" style="width:0%"></div></div></div>`;

  // 1) Conectar y suscribirse a Firebase (tickets en tiempo real)
  if(!fbReady) initFirebase();
  await new Promise(resolve=>{
    if(!fbReady){ resolve(); return; }
    if(fbSuscrito){ resolve(); return; } // ya suscrito de un login anterior
    const el=$("load-msg"); if(el) el.textContent="Sincronizando tickets…";
    const pp=$("load-prog"); if(pp) pp.style.width="30%";
    suscribirEstado(resolve);
  });

  // 2) Cargar base de facturas desde Google Sheets
  try{
    await cargarBaseDesdeSheets(false,(msg,pct)=>{
      const el=$("load-msg"); if(el) el.textContent=msg;
      const pp=$("load-prog"); if(pp) pp.style.width=Math.max(40,pct)+"%";
    });
  }catch(e){
    toast("⚠ "+e.message,6000);
  }
  render();
}
function logout(){ me=null; $("login-pass").value=""; $("app-view").style.display="none"; $("login-view").style.display="flex"; baseLoaded=false; }

/* ============================================================ RENDER ROUTER ============================================================ */
function render(){
  const fb=$("chip-fb"); if(fb) fb.textContent=fbReady?"🟢 En línea":"🔴 Sin conexión";
  if(me.role==="ASESOR") renderAsesor();
  else if(me.role==="MERCADERIA") renderBandeja("MERCADERIA","Bandeja · Revisión de mercadería","Digita la cantidad que llegó de cada producto.");
  else if(me.role==="DEVOLUCION") renderBandeja("DEVOLUCION","Bandeja · Revisión de devolución","Tickets con mercadería recibida cuyo motivo es devolución.");
  else if(me.role==="GARANTIA") renderBandeja("GARANTIA","Bandeja · Revisión de garantía","Tickets de garantía con mercadería recibida.");
  else if(me.role==="NC") renderNC();
  else renderAdmin();
}

function buscarRazon(){
  const q=$("n-razon").value.trim().toUpperCase();
  const list=$("n-razon-list");
  if(q.length<2){list.style.display="none";return;}
  const matches=[];
  for(const r of RAZONES){if(r.toUpperCase().includes(q)){matches.push(r);if(matches.length>=60)break;}}
  if(matches.length===0){list.innerHTML='<div class="muted" style="cursor:default">Sin coincidencias</div>';list.style.display="block";return;}
  list.innerHTML=matches.map(r=>`<div onclick="elegirRazon(this.textContent)">${esc(r)}</div>`).join("");
  list.style.display="block";
}
function elegirRazon(r){$("n-razon").value=r;$("n-razon-list").style.display="none";nRazon();}
function nRazon(){
  const r=$("n-razon").value; nuevo.razon=r;
  const facts=[...new Set(base.filter(x=>x.razon.trim()===r).map(x=>x.factura))];
  $("n-fact").disabled=false;
  $("n-fact").innerHTML='<option value="">— Seleccionar —</option>'+facts.map(f=>`<option>${esc(f)}</option>`).join("");
  $("n-emi").value=""; $("n-items").innerHTML=""; filtroItems="";
}
function nFact(){
  const f=$("n-fact").value; nuevo.factura=f;
  const rows=base.filter(x=>x.razon.trim()===nuevo.razon&&x.factura===f);
  nuevo.lineas=rows; nuevo.emision=rows[0]?rows[0].emision:""; nuevo.ruc=rows[0]?rows[0].ruc:"";
  nuevo.facturador=rows[0]?rows[0].facturador:"";
  $("n-emi").value=fdate(nuevo.emision); filtroItems="";
  renderItemsNuevo();
}
function renderItemsNuevo(){
  if(!nuevo.lineas||!nuevo.lineas.length){$("n-items").innerHTML="";return;}
  const usados=codigosUsados(nuevo.factura);
  const q=filtroItems.trim().toUpperCase();
  const lineas=nuevo.lineas;
  $("n-items").innerHTML=`
    <div class="srch-bar">
      <span>🔍</span>
      <input type="text" id="n-srch" placeholder="Buscar código o descripción dentro de la factura…" value="${esc(filtroItems)}" oninput="filtroItems=this.value;renderItemsNuevo()">
      ${filtroItems?`<button class="btn btn-sm btn-g" style="white-space:nowrap" onclick="filtroItems='';renderItemsNuevo()">✕ Limpiar</button>`:""}
    </div>
    <div style="overflow-x:auto"><table><thead><tr><th>Código</th><th>Descripción</th><th class="num">Cant. fact.</th><th style="width:84px">Cantidad</th><th style="min-width:160px">Comentario</th><th class="num">P. neto</th><th class="num">Total</th></tr></thead><tbody id="n-tbody">
    </tbody></table></div>
    <div class="muted" style="margin-top:4px" id="n-count"></div>`;
  const tbody=$("n-tbody");
  let shown=0;
  lineas.forEach((r,i)=>{
    const dup=usados.get(r.codigo);
    const txt=(r.codigo+" "+r.desc+" "+r.sub).toUpperCase();
    if(q&&!txt.includes(q)) return;
    shown++;
    const hlCod=q?r.codigo.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),"gi"),m=>`<span class="hl">${m}</span>`):esc(r.codigo);
    const tr=document.createElement("tr");
    tr.innerHTML=`<td><b>${hlCod}</b>${dup?`<br><span class="tag tag-bad">En ticket ${esc(dup)}</span>`:""}</td>
      <td style="max-width:280px;font-size:12px">${esc(r.desc)}<div class="muted">${esc(r.sub)}</div></td>
      <td class="num">${r.cant}</td>
      <td><input type="number" min="0" max="${r.cant}" value="0" id="q-${i}" oninput="nCalc(${i})" style="text-align:right" ${dup?"disabled":""}></td>
      <td><input id="c-${i}" placeholder="Comentario" ${dup?"disabled":""}></td>
      <td class="num" id="pn-${i}">$0.00</td><td class="num" id="tt-${i}">$0.00</td>`;
    tbody.appendChild(tr);
  });
  if($("n-count")) $("n-count").textContent=q?`Mostrando ${shown} de ${lineas.length} productos`:`${lineas.length} productos en esta factura`;
  if(shown===0&&q) tbody.innerHTML=`<tr><td colspan="7" class="muted" style="text-align:center;padding:20px">Sin resultados para "${esc(filtroItems)}"</td></tr>`;
}
function nCalc(i){
  const r=nuevo.lineas[i]; if(!r) return;
  let q=Math.max(0,Math.min(r.cant,+($("q-"+i)?$("q-"+i).value:0))); if($("q-"+i)) $("q-"+i).value=q;
  const f=r.cant?q/r.cant:0;
  if($("pn-"+i)) $("pn-"+i).textContent=money(r.neto*f);
  if($("tt-"+i)) $("tt-"+i).textContent=money(r.total*f);
}
function nNum(){
  const m=$("n-motivo").value; nuevo.motivo=m;
  if(!m){$("n-num").value="";return;}
  const gar=m==="GARANTIAS"; const next=gar?state.seq5200+1:state.seq3200+1;
  $("n-num").value=(gar?"5200":"3200")+"-"+String(next).padStart(4,"0");
}
async function guardarTicket(){
  if(!nuevo.razon||!nuevo.factura){toast("Selecciona razón social y factura.");return;}
  if(!nuevo.motivo){toast("Selecciona el motivo del ticket.");return;}
  const usados=codigosUsados(nuevo.factura);
  const items=[]; let repetido=null;
  nuevo.lineas.forEach((r,i)=>{
    const el=$("q-"+i); if(!el) return;
    const q=+(el.value||0); if(q<=0) return;
    if(usados.has(r.codigo)){repetido=r.codigo+" (ticket "+usados.get(r.codigo)+")";return;}
    const f=q/r.cant;
    items.push({codigo:r.codigo,desc:r.desc,sub:r.sub,cantidad:q,comVendedor:($("c-"+i)?.value||"").trim(),
      neto:+(r.neto*f).toFixed(4),iva:+(r.iva*f).toFixed(4),total:+(r.total*f).toFixed(4)});
  });
  if(repetido){toast("El código "+repetido+" ya está en otro ticket activo. Elimínalo primero.");return;}
  if(items.length===0){toast("Ingresa cantidad en al menos un producto.");return;}
  const gar=nuevo.motivo==="GARANTIAS"; if(gar) state.seq5200++; else state.seq3200++;
  const num=(gar?"5200":"3200")+"-"+String(gar?state.seq5200:state.seq3200).padStart(4,"0");
  const t={id:"T"+Date.now(),numero:num,motivo:nuevo.motivo,razonSocial:nuevo.razon,ruc:nuevo.ruc,
    factura:nuevo.factura,emision:nuevo.emision,facturador:nuevo.facturador||"",fechaTicket:new Date().toISOString(),
    vendedor:me.name,estado:"MERCADERIA",items,fechas:{},
    historial:[{f:new Date().toISOString(),e:"Ticket creado por "+me.name}]};
  state.tickets.push(t); await saveState();
  $("modal-root").innerHTML=""; toast("✓ Ticket "+num+" creado.");
  setTimeout(()=>imprimirTicket(t.id),400);
  render();
}

  const p2="Luego de realizar la evaluación técnica correspondiente, se ha determinado que la falla no corresponde a un defecto de fábrica, por tanto no aplica la garantía"+(g.cartaCom?", "+g.cartaCom:".");
  const p3=g.parrafo2||"";

  [p1,p2,p3,p4].forEach(p=>{if(!p)return;const ls=d.splitTextToSize(p,180);d.text(ls,14,y,{maxWidth:180,align:"justify"});y+=ls.length*4.8+5;});
  y+=10;d.text("Cordialmente,",14,y);y+=18;
  d.setFont("helvetica","bold");d.text("Soporte Técnico",105,y,{align:"center"});y+=5;d.text("LUBAMAQUI",105,y,{align:"center"});
  pieCorporativo(d);
  d.addPage();
  const it=g.informe||{};
  d.autoTable({startY:14,body:[["LUBAMAQUI","INFORME TÉCNICO","Código: "+(it.codigoDoc||"")+"\nFecha: "+fdate(g.f)]],
    theme:"grid",styles:{fontSize:9,valign:"middle"},columnStyles:{0:{cellWidth:45,fontStyle:"bold",halign:"center"},1:{fontStyle:"bold",halign:"center",fontSize:14},2:{cellWidth:48,fontSize:7}}});
  const sec=(titulo,rows)=>d.autoTable({startY:d.lastAutoTable.finalY+3,head:[[{content:titulo,colSpan:2,styles:{fillColor:[230,234,239],textColor:[0,0,0],fontStyle:"bold"}}]],body:rows,theme:"grid",styles:{fontSize:8.5,cellPadding:1.6}});
  sec("1. DATOS GENERALES",[["CLIENTE: "+t.razonSocial,"FACTURA: "+t.factura],["CONTACTO: "+(it.contacto||""),"DIRECCIÓN: "+(it.direccion||"")],["CONDICIÓN: "+(it.condicion||""),"GARANTÍA: NO APLICA"]]);
  sec("2. DATOS DEL PRODUCTO",[["CÓD. PRODUCTO: "+i.codigo,"DESCRIPCIÓN: "+i.desc],[{content:"APLICACIÓN: "+(it.aplicacion||""),colSpan:2}],["MODELO: "+(it.modelo||""),"ORDEN DE ENCENDIDO: "+(it.ordenEncendido||"")],["DISTRIBUIDOR: "+(it.distribuidor||"AUTOREPUESTOS UNIVERSAL"),"PRESIÓN MÁX. ACEITE: "+(it.presionAceite||"")]]);
  sec("3. ANTECEDENTES",[[{content:g.antecedentes||" ",colSpan:2}]]);
  sec("4. REVISIÓN TÉCNICA",[[{content:g.revTecnica||" ",colSpan:2}]]);
  let y2=d.lastAutoTable.finalY+8;
  if(g.fotos&&g.fotos.length){
    if(y2>240){d.addPage();y2=20;}
    d.setFont("helvetica","bold");d.setFontSize(10);d.text("5. ANEXOS",14,y2);y2+=5;
    const MAXW=170,MAXH=150;
    g.fotos.forEach(f=>{
      const foto=typeof f==="string"?{data:f,w:800,h:600}:f;
      let w=MAXW,h=foto.w&&foto.h?MAXW*foto.h/foto.w:120;
      if(h>MAXH){h=MAXH;w=foto.w&&foto.h?MAXH*foto.w/foto.h:MAXW;}
      if(y2+h>285){d.addPage();y2=20;}
      const x=(210-w)/2;
      try{d.addImage(foto.data,"JPEG",x,y2,w,h);}catch(e){}

    });

  if(y2>250){d.addPage();y2=20;}
  d.autoTable({startY:y2,head:[[{content:"6. ANÁLISIS, CONCLUSIONES Y RECOMENDACIONES",styles:{fillColor:[230,234,239],textColor:[0,0,0],fontStyle:"bold"}}]],body:[[g.conclusiones||" "]],theme:"grid",styles:{fontSize:8.5,cellPadding:2,minCellHeight:24}});

}
function histTable(role){
  let l=state.tickets.filter(t=>t.estado!=="ELIMINADO").filter(t=>{
    if(role==="MERCADERIA") return t.items.some(i=>i.merc);
    if(role==="DEVOLUCION") return t.items.some(i=>i.dev);
    if(role==="GARANTIA") return !!t.gar;
  }).slice().reverse();
  if(l.length===0) return '<div class="muted">Sin tickets procesados aún.</div>';
  return `<table><thead><tr><th>N° Ticket</th><th>Razón social</th><th>Estado</th><th></th></tr></thead><tbody>
  ${l.map(t=>`<tr><td><b>${esc(t.numero)}</b></td><td>${esc(t.razonSocial)}</td><td>${tagFor(t)}</td>
  <td style="white-space:nowrap"><button class="btn btn-g btn-sm" onclick="verTicket('${t.id}')">Ver</button>
  ${role==="GARANTIA"&&t.gar&&!t.gar.acepta?` <button class="btn btn-a btn-sm" onclick="editarGar('${t.id}')">✎ Editar</button>`:""}</td></tr>`).join("")}
  </tbody></table>`;
}
function revisar(role,id){
  const t=findT(id);
  if(role==="MERCADERIA") revisarMerc(t);
  else if(role==="DEVOLUCION") revisarDev(t);
  else revisarGar(t);
}

/* ---- Revisión mercadería ---- */
function revisarMerc(t){
  $("modal-root").innerHTML=`<div class="modal-bg"><div class="modal">

    ${t.items.map((i,x)=>`<tr><td><b>${esc(i.codigo)}</b></td><td style="max-width:240px;font-size:12px">${esc(i.desc)}</td>

      <td class="num">${i.cantidad}</td>

      <button class="btn btn-p" onclick="guardarMerc('${t.id}')">Guardar revisión</button>
    </div>
  </div></div>`;
}
function mercTodo(id,todo){
  const t=findT(id);
  t.items.forEach((i,x)=>{const el=$("m-q-"+x);if(el)el.value=todo?i.cantidad:0;});
}
async function guardarMerc(id){
  const t=findT(id);
  for(let x=0;x<t.items.length;x++){if(!$("m-q-"+x)||$("m-q-"+x).value===""){toast("Digita la cantidad llegada en todos los productos.");return;}}
  const ahora=new Date().toISOString();
  t.items.forEach((i,x)=>{const q=Math.max(0,Math.min(i.cantidad,+($("m-q-"+x).value||0)));i.merc={cantLlegada:q,com:$("m-co-"+x).value,por:me.name,f:ahora};});
  t.fechas=t.fechas||{};t.fechas.mercaderia=ahora;
  const totLlego=t.items.reduce((s,i)=>s+llegoQ(i),0);
  if(totLlego===0){t.estado="NO_LLEGO";t.historial.push({f:ahora,e:"No llegó mercadería. "+me.name});}
  else if(t.motivo==="GARANTIAS"){t.estado="GARANTIA";t.historial.push({f:ahora,e:"Mercadería recibida → garantía ("+me.name+")"});}
  else{t.estado="DEVOLUCION";t.historial.push({f:ahora,e:"Mercadería recibida → devolución ("+me.name+")"});}
  await saveState();$("modal-root").innerHTML="";toast("✓ Revisión de mercadería guardada.");render();
}

/* ---- Revisión devolución ---- */
function revisarDev(t){
  const items=t.items.filter(i=>llegoQ(i)>0);
  $("modal-root").innerHTML=`<div class="modal-bg"><div class="modal">
    <h2 style="font-size:24px;color:var(--navy)">Revisión de devolución · ${esc(t.numero)}</h2>
    <div class="muted" style="margin-bottom:14px">${esc(t.razonSocial)} · Factura ${esc(t.factura)}</div>
    ${items.map(i=>{const x=t.items.indexOf(i);const q=llegoQ(i);return `<div class="itm">
      <div style="margin-bottom:8px"><b>${esc(i.codigo)}</b> <span class="muted">Llegaron: ${q} de ${i.cantidad}</span>
      <div style="font-size:12px">${esc(i.desc)}</div>${i.comVendedor?`<div class="muted">${esc(i.comVendedor)}</div>`:""}</div>
      <div class="grid3">
        <div><label>Decisión</label><select id="d-ac-${x}"><option value="">—</option><option value="1">SÍ SE ACEPTA</option><option value="0">NO SE ACEPTA</option></select></div>
        <div><label>Cantidad aceptada</label><input type="number" min="0" max="${q}" value="${q}" id="d-ca-${x}" style="text-align:right"></div>
        <div><label>Comentario</label><input id="d-co-${x}"></div>
      </div></div>`;}).join("")}
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-g" onclick="$('modal-root').innerHTML=''">Cancelar</button>
      <button class="btn btn-p" onclick="guardarDev('${t.id}')">Guardar revisión</button>
    </div>
  </div></div>`;
}
async function guardarDev(id){
  const t=findT(id);
  const idxs=t.items.map((i,x)=>llegoQ(i)>0?x:-1).filter(x=>x>=0);
  for(const x of idxs){if($("d-ac-"+x).value===""){toast("Selecciona la decisión en todos los productos.");return;}}
  const ahora=new Date().toISOString();
  idxs.forEach(x=>{const i=t.items[x];const max=llegoQ(i);
    i.dev={acepta:$("d-ac-"+x).value==="1",cantAcep:Math.max(0,Math.min(max,+($("d-ca-"+x).value||0))),com:$("d-co-"+x).value,por:me.name,f:ahora};});
  t.fechas=t.fechas||{};t.fechas.devolucion=ahora;
  const alguna=idxs.some(x=>t.items[x].dev.acepta&&t.items[x].dev.cantAcep>0);
  if(alguna){t.estado="NC";t.nc=t.nc||{hecha:false};t.historial.push({f:ahora,e:"Devolución aceptada → NC ("+me.name+")"});}
  else{t.estado="DEV_RECHAZADA";t.historial.push({f:ahora,e:"Devolución no aceptada ("+me.name+")"});}
  await saveState();$("modal-root").innerHTML="";toast("✓ Revisión de devolución guardada.");render();
}

function fotoThumb(f,ix){return `<div style="position:relative"><img class="thumb" src="${f.data}"><button onclick="quitarFoto(${ix})" style="position:absolute;top:-6px;right:-6px;background:var(--bad);color:#fff;border:none;border-radius:99px;width:20px;height:20px;font-size:11px">✕</button></div>`;}
function quitarFoto(ix){garFotos.splice(ix,1);$("g-fotos").innerHTML=garFotos.map((f,i)=>fotoThumb(f,i)).join("");}
function revisarGar(t){formGar(t,null);}
function editarGar(id){formGar(findT(id),findT(id).gar);}
function cargarFotos(inp){
  [...inp.files].forEach(f=>{
    const img=new Image(),rd=new FileReader();
    rd.onload=()=>{img.onload=()=>{
      const c=document.createElement("canvas");const s=Math.min(1,1000/Math.max(img.width,img.height));
      c.width=img.width*s;c.height=img.height*s;c.getContext("2d").drawImage(img,0,0,c.width,c.height);
      garFotos.push({data:c.toDataURL("image/jpeg",.72),w:c.width,h:c.height});
      $("g-fotos").innerHTML=garFotos.map((ff,i)=>fotoThumb(ff,i)).join("");};img.src=rd.result;};
    rd.readAsDataURL(f);});inp.value="";
}

  const t=findT(id);const ac=$("g-ac").value;if(ac===""){toast("Selecciona si se acepta la garantía.");return;}
  const ahora=new Date().toISOString();const yaRevisado=!!t.gar;
  t.fechas=t.fechas||{};if(!yaRevisado)t.fechas.garantia=ahora;
  if(ac==="1"){
    t.gar={acepta:true,com:$("g-com").value,por:me.name,f:t.gar?.f||ahora};
    t.estado="NC";t.nc=t.nc||{hecha:false};
    t.historial.push({f:ahora,e:"Garantía aceptada → NC ("+me.name+")"});
  }else{
    t.gar={acepta:false,com:$("g-com").value,marca:$("g-marca").value,
      ciudad:$("g-ciudad").value,telefono:$("g-tel").value,email:$("g-email").value,
      cartaCom:$("g-carta").value,parrafo2:$("g-p2").value,
      antecedentes:$("g-ant").value,revTecnica:$("g-rev").value,conclusiones:$("g-conclu").value,fotos:garFotos,
      informe:{contacto:$("i-contacto").value,direccion:$("i-dir").value,condicion:$("i-cond").value,
        aplicacion:$("i-apl").value,modelo:$("i-mod").value,ordenEncendido:$("i-orden").value,
        presionAceite:$("i-pres").value,distribuidor:$("i-dist").value},por:me.name,f:t.gar?.f||ahora};
    t.estado="GAR_RECHAZADA";t.historial.push({f:ahora,e:"Garantía no aceptada ("+me.name+")"});
  }
  await saveState();$("modal-root").innerHTML="";render();
  if(ac==="0"){toast("Guardado. Generando carta e informe…");pdfCartaGar(id);}
  else toast("✓ Garantía aceptada → notas de crédito.");
}

/* ============================================================ NOTAS DE CRÉDITO ============================================================ */
let ncTab="pend";
function renderNC(){
  const lista=state.tickets.filter(t=>t.estado==="NC").slice().reverse();
  const pend=lista.filter(t=>!t.nc.hecha),hechas=lista.filter(t=>t.nc.hecha);
  const show=ncTab==="pend"?pend:hechas;
  $("main").innerHTML=`
    <h2 style="font-size:28px;color:var(--navy)">Bandeja · Notas de crédito</h2>
    <div class="muted" style="margin-bottom:16px">Devoluciones y garantías aceptadas.</div>
    <div class="tabs">
      <button class="tab ${ncTab==="pend"?"on":""}" onclick="ncTab='pend';render()">Pendientes (${pend.length})</button>
      <button class="tab ${ncTab==="hechas"?"on":""}" onclick="ncTab='hechas';render()">NC hechas (${hechas.length})</button>
    </div>
    <div class="card">
    ${show.length===0?'<div class="empty"><div class="big">Nada aquí</div></div>':`
    <div style="overflow-x:auto"><table><thead><tr><th>N° Ticket</th><th>Origen</th><th>Razón social</th><th>Factura</th><th class="num">Total aceptado</th><th>N° NC</th><th>Estado</th><th></th></tr></thead><tbody>
    ${show.map(t=>{const tot=totalAceptado(t);return `<tr><td><b>${esc(t.numero)}</b></td><td>${t.motivo==="GARANTIAS"?"Garantía":"Devolución"}</td>
    <td>${esc(t.razonSocial)}</td><td>${esc(t.factura)}</td><td class="num">${money(tot)}</td>
    <td>${t.nc.numero?"<b>"+esc(t.nc.numero)+"</b>":"—"}${t.nc.pdfKey?` <button class="btn btn-g btn-sm" onclick="verPdfNC('${t.id}')">PDF</button>`:""}</td>
    <td>${t.nc.hecha?'<span class="tag tag-nc">NC hecha</span>':'<span class="tag tag-merc">Pendiente</span>'}</td>
    <td style="white-space:nowrap">
      <button class="btn btn-ok btn-sm" onclick="abrirRegistrarNC('${t.id}')">${t.nc.hecha?"Editar":"Registrar NC"}</button>
      <button class="btn btn-g btn-sm" onclick="verTicket('${t.id}')">Ver</button>
      <button class="btn btn-g btn-sm" onclick="excelNC('${t.id}')">Excel</button>
    </td></tr>`;}).join("")}
    </tbody></table></div>`}
    </div>`;
}
function itemsAceptados(t){
  if(t.motivo==="GARANTIAS") return t.items.filter(i=>llegoQ(i)>0).map(i=>{const q=llegoQ(i);const f=i.cantidad?q/i.cantidad:0;return {...i,cantNC:q,neto:i.neto*f,iva:i.iva*f,total:i.total*f};});
  return t.items.filter(i=>i.dev&&i.dev.acepta&&i.dev.cantAcep>0).map(i=>{const f=i.cantidad?i.dev.cantAcep/i.cantidad:0;return {...i,cantNC:i.dev.cantAcep,neto:i.neto*f,iva:i.iva*f,total:i.total*f};});
}
function totalAceptado(t){return itemsAceptados(t).reduce((s,i)=>s+i.total,0);}
let ncPdfData=null;
function abrirRegistrarNC(id){
  const t=findT(id);ncPdfData=null;
  $("modal-root").innerHTML=`<div class="modal-bg"><div class="modal" style="max-width:560px">
    <h2 style="font-size:22px;color:var(--navy);margin-bottom:8px">Registrar NC · ${esc(t.numero)}</h2>
    <div class="muted" style="margin-bottom:14px">${esc(t.razonSocial)} · Total: <b>${money(totalAceptado(t))}</b></div>
    <div class="field"><label>N° de nota de crédito</label><input id="nc-num" value="${esc(t.nc.numero||"")}" placeholder="Ej.: 001-002-000012345"></div>
    <div class="field"><label>PDF de la NC ${t.nc.pdfName?"(actual: "+esc(t.nc.pdfName)+")":""}</label>
      <input type="file" accept="application/pdf" onchange="leerPdfNC(this)">
      <div class="muted" id="nc-pdf-info" style="margin-top:4px">Máximo 3.5 MB.</div></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-g" onclick="$('modal-root').innerHTML=''">Cancelar</button>
      <button class="btn btn-ok" onclick="guardarRegistroNC('${t.id}')">Guardar · marcar NC hecha</button>
    </div>
  </div></div>`;
}
function leerPdfNC(inp){
  const f=inp.files[0];if(!f)return;
  if(f.size>3.5*1024*1024){$("nc-pdf-info").innerHTML='<span style="color:var(--bad)">Más de 3.5 MB. Comprime el PDF.</span>';inp.value="";return;}
  const rd=new FileReader();rd.onload=()=>{ncPdfData={data:rd.result,name:f.name};$("nc-pdf-info").textContent="Listo: "+f.name+" ("+(f.size/1024).toFixed(0)+" KB)";};rd.readAsDataURL(f);
}
async function guardarRegistroNC(id){
  const t=findT(id);const num=$("nc-num").value.trim();
  if(!num){toast("Ingresa el número de la NC.");return;}
  const ahora=new Date().toISOString();t.nc.numero=num;
  if(ncPdfData){
    try{await guardarPdfNC(t.id,ncPdfData);t.nc.pdfKey=t.id;t.nc.pdfName=ncPdfData.name;}
    catch(e){toast("PDF no guardado: "+(e&&e.message||e));}}
  if(!t.nc.hecha){t.nc.hecha=true;t.fechas=t.fechas||{};t.fechas.nc=ahora;}
  t.historial.push({f:ahora,e:"NC registrada N° "+num+" ("+me.name+")"});
  await saveState();$("modal-root").innerHTML="";toast("✓ NC "+num+" registrada.");render();
}
async function verPdfNC(id){
  const t=findT(id);if(!t.nc||!t.nc.pdfKey){toast("Sin PDF de NC.");return;}
  try{const o=await leerPdfNCfb(t.nc.pdfKey);
    if(!o){toast("No se encontró el PDF.");return;}
    $("modal-root").innerHTML=`<div class="modal-bg"><div class="modal" style="max-width:880px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap">
        <h3 style="color:var(--navy);flex:1">NC ${esc(t.nc.numero||"")} · ${esc(o.name)}</h3>
        <a class="btn btn-a" href="${o.data}" download="${esc(o.name)}" target="_blank">⬇ Descargar</a>
        <button class="btn btn-g" onclick="$('modal-root').innerHTML=''">Cerrar</button>
      </div>
      <iframe src="${o.data}" style="width:100%;height:68vh;border:1px solid var(--line);border-radius:8px"></iframe>
    </div></div>`;}catch(e){toast("No se pudo cargar el PDF: "+(e&&e.message||e));}
}
function excelNC(id){
  const t=findT(id),its=itemsAceptados(t);
  const rows=its.map(i=>({"N° TICKET":t.numero,"MOTIVO":t.motivo,"RAZON SOCIAL":t.razonSocial,"RUC":t.ruc,"FACTURA":t.factura,"FACTURADOR":t.facturador||"","EMISION":fdate(t.emision),"VENDEDOR":t.vendedor,"CODIGO":i.codigo,"DESCRIPCION":i.desc,"SUBGRUPO":i.sub,"CANTIDAD":i.cantNC,"NETO":+i.neto.toFixed(2),"IVA":+i.iva.toFixed(2),"TOTAL":+i.total.toFixed(2),"N° NC":t.nc?.numero||"","ESTADO NC":t.nc?.hecha?"HECHA":"PENDIENTE"}));
  const ws=XLSX.utils.json_to_sheet(rows),wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Informe NC");
  XLSX.writeFile(wb,"Informe_NC_"+t.numero+".xlsx");
}

/* ============================================================ ADMIN ============================================================ */
function renderAdmin(){
  const total=state.tickets.length;
  const porEstado=e=>state.tickets.filter(t=>t.estado===e).length;
  $("main").innerHTML=`
    <h2 style="font-size:28px;color:var(--navy);margin-bottom:16px">Panel administrativo</h2>
    <div class="card" style="border-left:5px solid var(--amber)">
      <h3 style="font-size:19px;color:var(--navy);margin-bottom:6px">Base de facturas (Google Sheets)</h3>
      <div class="muted" style="margin-bottom:10px">
        ${baseLoaded?`✓ Base en memoria: <b>${base.length.toLocaleString("es-EC")}</b> líneas · <b>${[...new Set(base.map(r=>r.factura))].length.toLocaleString("es-EC")}</b> facturas`:"Base no cargada"}<br>
        La base se carga automáticamente desde Google Sheets al iniciar sesión. También puedes forzar una recarga aquí.
      </div>
      <button class="btn btn-p" onclick="forzarRecargaAdmin()">🔄 Recargar base desde Google Sheets</button>
      <div id="adm-prog" style="margin-top:10px"></div>
    </div>
    <div class="card" style="border-left:5px solid var(--ok)">
      <h3 style="font-size:19px;color:var(--navy);margin-bottom:6px">Reporte consolidado</h3>
      <div class="muted" style="margin-bottom:12px">Excel con todos los tickets, fechas de respuesta, N° de NC y estado.</div>
      <button class="btn btn-ok" onclick="reporteConsolidado()">⬇ Descargar reporte (Excel)</button>
    </div>
    <div class="grid3">
      <div class="card"><div class="disp" style="font-size:34px;color:var(--navy)">${total}</div><div class="muted">Tickets totales</div></div>
      <div class="card"><div class="disp" style="font-size:34px;color:#8A6400">${porEstado("MERCADERIA")+porEstado("DEVOLUCION")+porEstado("GARANTIA")}</div><div class="muted">En proceso</div></div>
      <div class="card"><div class="disp" style="font-size:34px;color:var(--ok)">${porEstado("NC")}</div><div class="muted">En notas de crédito</div></div>
    </div>
    <div class="card">
      <h3 style="font-size:19px;color:var(--navy);margin-bottom:10px">Todos los tickets</h3>
      ${total===0?'<div class="empty"><div class="big">Sin tickets</div></div>':`
      <div style="overflow-x:auto"><table><thead><tr><th>N° Ticket</th><th>Fecha</th><th>Razón social</th><th>Motivo</th><th>Vendedor</th><th>Estado</th><th></th></tr></thead><tbody>
      ${state.tickets.slice().reverse().map(t=>`<tr><td><b>${esc(t.numero)}</b></td><td>${fdate(t.fechaTicket)}</td><td>${esc(t.razonSocial)}</td><td>${esc(t.motivo)}</td><td>${esc(t.vendedor)}</td><td>${tagFor(t)}</td>
      <td style="white-space:nowrap"><button class="btn btn-g btn-sm" onclick="verTicket('${t.id}')">Ver</button>
      ${t.estado!=="ELIMINADO"?`<button class="btn btn-bad btn-sm" onclick="abrirEliminar('${t.id}')">Eliminar</button>`:""}</td></tr>`).join("")}
      </tbody></table></div>`}
    </div>`;
}
async function forzarRecargaAdmin(){
  const prog=$("adm-prog");
  if(prog) prog.innerHTML=`<div class="muted">Descargando…</div><div class="prog-bar"><div class="prog-fill" id="adm-fill" style="width:0%"></div></div>`;
  try{
    await cargarBaseDesdeSheets(true,(msg,pct)=>{
      const el=$("adm-prog");if(!el)return;
      el.innerHTML=`<div class="muted">${esc(msg)}</div><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>`;
    });
    toast("✓ Base recargada: "+base.length.toLocaleString("es-EC")+" líneas");
    render();
  }catch(e){ toast("Error: "+e.message,6000); const el=$("adm-prog"); if(el) el.innerHTML=`<div class="muted" style="color:var(--bad)">${esc(e.message)}</div>`; }
}
function abrirEliminar(id){
  const t=findT(id);
  $("modal-root").innerHTML=`<div class="modal-bg"><div class="modal" style="max-width:520px">
    <h2 style="font-size:22px;color:var(--bad);margin-bottom:8px">Eliminar ticket ${esc(t.numero)}</h2>
    <div class="muted" style="margin-bottom:14px">${esc(t.razonSocial)} · Factura ${esc(t.factura)}</div>
    <div class="field"><label>Motivo de eliminación (el vendedor lo verá)</label>
      <textarea id="del-motivo" rows="3" placeholder="Ej.: ticket duplicado, factura incorrecta…"></textarea></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-g" onclick="$('modal-root').innerHTML=''">Cancelar</button>
      <button class="btn btn-bad" onclick="confirmarEliminar('${t.id}')">Eliminar ticket</button>
    </div>
  </div></div>`;
}
async function confirmarEliminar(id){
  const motivo=$("del-motivo").value.trim();if(!motivo){toast("Escribe el motivo.");return;}
  const t=findT(id);const ahora=new Date().toISOString();
  t.estadoAnterior=t.estado;t.estado="ELIMINADO";t.eliminacion={motivo,por:me.name,f:ahora};
  t.historial.push({f:ahora,e:"Eliminado por "+me.name+". Motivo: "+motivo});
  await saveState();$("modal-root").innerHTML="";toast("✓ Ticket "+t.numero+" eliminado.");render();
}
function reporteConsolidado(){
  if(state.tickets.length===0){toast("No hay tickets.");return;}
  const rows=state.tickets.map(t=>({
    "N° TICKET":t.numero,"FECHA CREACION":fdatetime(t.fechaTicket),"FACTURA":t.factura,"FACTURADOR":t.facturador||"",
    "EMISION":fdate(t.emision),"RAZON SOCIAL":t.razonSocial,"RUC":t.ruc||"","VENDEDOR":t.vendedor,"MOTIVO":t.motivo,
    "FECHA MERCADERIA":t.fechas?.mercaderia?fdatetime(t.fechas.mercaderia):"",
    "FECHA DEVOLUCION":t.fechas?.devolucion?fdatetime(t.fechas.devolucion):"",
    "FECHA GARANTIA":t.fechas?.garantia?fdatetime(t.fechas.garantia):"",
    "FECHA NC":t.fechas?.nc?fdatetime(t.fechas.nc):"",
    "N° NC":t.nc?.numero||"","ESTADO NC":t.nc?(t.nc.hecha?"HECHA":"PENDIENTE"):"",
    "ESTADO":ESTADO_LABEL[t.estado]||t.estado,
    "MOTIVO ELIMINACION":t.eliminacion?t.eliminacion.motivo:"",
    "TOTAL TICKET":+t.items.reduce((s,i)=>s+i.total,0).toFixed(2),
    "TOTAL ACEPTADO":t.estado==="NC"||t.fechas?.nc?+totalAceptado(t).toFixed(2):""
  }));
  const ws=XLSX.utils.json_to_sheet(rows),wb=XLSX.utils.book_new();
  ws["!cols"]=Object.keys(rows[0]).map(k=>({wch:Math.max(14,k.length+2)}));
  XLSX.utils.book_append_sheet(wb,ws,"Consolidado");
  XLSX.writeFile(wb,"Reporte_Consolidado_"+new Date().toISOString().slice(0,10)+".xlsx");
}

/* ============================================================ INIT ============================================================ */
initLogin();
</script>
